<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CALCULATEUR DE POURBOIRE 'INTELLIGENT'</title>
    <link rel="stylesheet" href="style.css">
    <!-- Favicon simple (optionnel, mais pro) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234CAF50'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <div class="header">
                <h1>CALCULATEUR DE POURBOIRE 'INTELLIGENT'</h1>
                <p>partagez l'addition equitalement <span class="badge">intelligent</span></p>
            </div>

            <div class="input-group">
                <label for="montant">🧾 Montant total de l'addition (FCFA)</label>
                <input type="number" id="montant" placeholder="Ex: 45.90" step="any" value="0">
                <small class="error-message" id="montantError"></small>
            </div>

            <div class="input-group">
                <label>🍽️ Pourboire</label>
                <div class="tip-buttons">
                    <button type="button" data-tip="5" class="tip-btn">5%</button>
                    <button type="button" data-tip="10" class="tip-btn active">10%</button>
                    <button type="button" data-tip="15" class="tip-btn">15%</button>
                </div>
                <div class="custom-tip">
                    <label for="customTip">Ou personnalisé (%)</label>
                    <input type="number" id="customTip" placeholder="Ex: 12" step="any" min="0" max="100">
                </div>
            </div>

            <div class="input-group">
                <label for="personnes">👥 Nombre de personnes</label>
                <input type="number" id="personnes" placeholder="1" value="1" min="1" step="1">
                <small class="error-message" id="personnesError"></small>
            </div>

            <div class="results">
                <div class="result-card">
                    <span class="result-label">💵 Pourboire total</span>
                    <span class="result-value" id="montantTip">0.00 €</span>
                </div>
                <div class="result-card highlight">
                    <span class="result-label">🍽️ Total par personne</span>
                    <span class="result-value" id="totalParPersonne">0.00 €</span>
                </div>
                <div class="result-card">
                    <span class="result-label">📊 Total général</span>
                    <span class="result-value" id="totalGeneral">0.00 €</span>
                </div>
            </div>

            <button id="resetBtn" class="reset-btn">⟳ Réinitialiser</button>
        </div>

        <footer>
            <p>✨ Application éducative - Calcul précis et intelligent ✨</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
